  #     - ollama_data:/root/.ollama
  #   networks:
  #     - app-network
  #   healthcheck:
  #     test: ["CMD", "ollama", "list"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 10
  #     start_period: 20s

  # ── Backend (chat API + DB queries) ────────────────────────────────────────
  backend:
    image: dd3638271007/kyouth-backend:latest
    env_file: docker.env
    ports:
      - "8001:8001"
    volumes:
      - ../week_2/data/jobs.db:/data/jobs.db:ro
    networks:
      - app-network
    # depends_on:
    #   ollama:
    #     condition: service_healthy

  # ── Frontend — landing (/) + chat app (/app) ──────────────────────────────
  frontend:
    image: dd3638271007/kyouth-frontend:latest
    env_file: docker.env
    ports:
      - "8000:8000"
    networks:
      - app-network
    depends_on:
      - backend

networks:
  app-network:
    driver: bridge

volumes:
  ollama_data:
