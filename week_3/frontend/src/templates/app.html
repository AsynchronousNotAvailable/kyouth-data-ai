<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <style>
    html, body { height: 100%; }
    body { background: #f0f2f5; }

    /* ── Chat ── */
    #chat-history {
      height: calc(100vh - 260px);
      min-height: 300px;
      overflow-y: auto;
      background: #fff;
      border-radius: 0.5rem;
      padding: 1rem;
    }
    .msg-bubble {
      max-width: 75%;
      padding: 0.55rem 0.85rem;
      border-radius: 1rem;
      margin-bottom: 0.5rem;
      line-height: 1.45;
      word-break: break-word;
    }
    .msg-user   { background: #0d6efd; color: #fff; border-bottom-right-radius: 0.2rem; }
    .msg-bot    { background: #e9ecef; color: #212529; border-bottom-left-radius: 0.2rem; }
    .msg-bot p  { margin-bottom: 0.4rem; }
    .msg-bot p:last-child { margin-bottom: 0; }
    .msg-bot ul, .msg-bot ol { padding-left: 1.25rem; margin-bottom: 0.4rem; }
    .msg-bot li { margin-bottom: 0.2rem; }
    .msg-bot strong { font-weight: 600; }
    .msg-bot code { background: #d0d3d8; border-radius: 0.25rem; padding: 0.1rem 0.35rem; font-size: 0.85em; }
    .msg-system { background: #fff3cd; color: #856404; font-size: 0.82rem; border-radius: 0.4rem; }

    /* ── PDF badge ── */
    #pdf-badge { display: none; }

    /* ── Dashboard ── */
    .chart-card { height: 340px; }
    .chart-card canvas { max-height: 280px; }

    /* ── Table ── */
    #results-table { font-size: 0.85rem; }
    .tech-pill {
      display: inline-block;
      background: #e7f1ff;
      color: #0a58ca;
      border-radius: 999px;
      padding: 0.1rem 0.55rem;
      margin: 0.1rem;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-primary shadow-sm">
  <div class="container-fluid">
    <span class="navbar-brand fw-semibold"><i class="bi bi-robot me-2"></i>Resume Helper</span>
    <ul class="nav nav-pills" id="mainTab" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active text-white" id="chat-tab" data-bs-toggle="pill" data-bs-target="#chat-pane" type="button">
          <i class="bi bi-chat-dots me-1"></i>Chat
        </button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link text-white" id="dash-tab" data-bs-toggle="pill" data-bs-target="#dash-pane" type="button">
          <i class="bi bi-bar-chart-line me-1"></i>Jobs Dashboard
        </button>
      </li>
    </ul>
  </div>
</nav>

<div class="container-fluid py-3 px-3 px-md-4">
  <div class="tab-content">

    <!-- ═══════════════════════════ CHAT PANE ═══════════════════════════ -->
    <div class="tab-pane fade show active" id="chat-pane" role="tabpanel">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-8 col-xl-7">

          <!-- History -->
          <div id="chat-history" class="shadow-sm mb-3">
            <div class="d-flex justify-content-start mb-2">
              <div class="msg-bubble msg-bot">
                Hi! I'm your resume helper. Ask me anything about your CV, or upload a PDF resume to get started.
              </div>
            </div>
          </div>

          <!-- Input area -->
          <div class="card shadow-sm">
            <div class="card-body p-2">

              <!-- PDF badge (hidden until a file is chosen) -->
              <div id="pdf-badge" style="display:none" class="align-items-center gap-2 mb-2 p-2 bg-light rounded">
                <i class="bi bi-file-earmark-pdf text-danger fs-5"></i>
                <span id="pdf-filename" class="text-truncate small fw-medium flex-grow-1"></span>
                <span id="pdf-status" class="badge bg-primary">Attached</span>
                <button class="btn btn-sm btn-outline-secondary py-0" id="remove-pdf" title="Remove PDF">
                  <i class="bi bi-x"></i>
                </button>
              </div>

              <div class="d-flex gap-2">
                <!-- PDF upload -->
                <label for="pdf-input" class="btn btn-outline-secondary" title="Attach PDF">
                  <i class="bi bi-paperclip"></i>
                </label>
                <input type="file" id="pdf-input" accept=".pdf" class="d-none">

                <!-- Text input -->
                <textarea id="user-input" class="form-control" rows="2"
                          placeholder="Type your message… (Shift+Enter for newline, Enter to send)"></textarea>

                <!-- Send -->
                <button id="send-btn" class="btn btn-primary px-3" title="Send">
                  <i class="bi bi-send-fill"></i>
                </button>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div><!-- /chat-pane -->

    <!-- ═══════════════════════════ DASHBOARD PANE ═══════════════════════════ -->
    <div class="tab-pane fade" id="dash-pane" role="tabpanel">

      <!-- Charts row -->
      <div class="row g-3 mb-3">
        <!-- Pie: role categories -->
        <div class="col-12 col-md-5">
          <div class="card shadow-sm chart-card">
            <div class="card-header fw-semibold"><i class="bi bi-pie-chart me-1"></i>Job Role Distribution</div>
            <div class="card-body d-flex align-items-center justify-content-center">
              <canvas id="roleChart"></canvas>
            </div>
          </div>
        </div>
        <!-- Bar: locations -->
        <div class="col-12 col-md-7">
          <div class="card shadow-sm chart-card">
            <div class="card-header fw-semibold"><i class="bi bi-geo-alt me-1"></i>Jobs by Location</div>
            <div class="card-body">
              <canvas id="locationChart"></canvas>
            </div>
          </div>
        </div>
      </div>

      <!-- Search + table -->
      <div class="card shadow-sm">
        <div class="card-header fw-semibold d-flex align-items-center gap-2">
          <i class="bi bi-search"></i>
          <input type="text" id="search-input" class="form-control form-control-sm"
                 placeholder="Search by title, company, or tech stack…" style="max-width:360px">
          <span id="result-count" class="badge bg-secondary ms-auto"></span>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive" style="max-height:420px;overflow-y:auto">
            <table class="table table-hover table-sm mb-0" id="results-table">
              <thead class="table-light sticky-top">
                <tr>
                  <th>Job Title</th>
                  <th>Company</th>
                  <th>Tech Stack</th>
                </tr>
              </thead>
              <tbody id="results-body">
                <tr><td colspan="3" class="text-center text-muted py-4">Loading…</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div><!-- /dash-pane -->
  </div><!-- /tab-content -->
</div>

<!-- ═══════════════════════════ SCRIPTS ═══════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
  // ── Config injected by server ─────────────────────────────────────────────
  const BACKEND_URL = "{{ backend_url }}";

  // ── PDF.js worker ─────────────────────────────────────────────────────────
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

  // ══════════════════════════════════════════════════════════════════════════
  // CHAT
  // ══════════════════════════════════════════════════════════════════════════
  const chatHistory = document.getElementById("chat-history");
  const userInput   = document.getElementById("user-input");
  const sendBtn     = document.getElementById("send-btn");
  const pdfInput    = document.getElementById("pdf-input");
  const pdfBadge    = document.getElementById("pdf-badge");
  const pdfFilename = document.getElementById("pdf-filename");
  const pdfStatus   = document.getElementById("pdf-status");
  const removePdf   = document.getElementById("remove-pdf");

  let pendingPdfFile = null;

  function appendMessage(text, role) {
    const wrap = document.createElement("div");
    wrap.className = `d-flex ${role === "user" ? "justify-content-end" : "justify-content-start"} mb-2`;
    const bubble = document.createElement("div");
    bubble.className = `msg-bubble msg-${role}`;
    if (role === "bot") {
      bubble.innerHTML = marked.parse(text);
    } else {
      bubble.textContent = text;
    }
    wrap.appendChild(bubble);
    chatHistory.appendChild(wrap);
    chatHistory.scrollTop = chatHistory.scrollHeight;
  }

  function appendSystem(text) {
    const wrap = document.createElement("div");
    wrap.className = "d-flex justify-content-center mb-2";
    const bubble = document.createElement("div");
    bubble.className = "msg-bubble msg-system";
    bubble.textContent = text;
    wrap.appendChild(bubble);
    chatHistory.appendChild(wrap);
    chatHistory.scrollTop = chatHistory.scrollHeight;
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    appendMessage(text, "user");
    userInput.value = "";
    sendBtn.disabled = true;

    // Extract PDF text now, at send time
    let pdfText = "";
    if (pendingPdfFile) {
      pdfStatus.textContent = "Extracting…";
      pdfStatus.className = "badge bg-warning text-dark";
      try {
        pdfText = await extractPdfText(pendingPdfFile);
        pdfStatus.textContent = `${pdfText.length.toLocaleString()} chars`;
        pdfStatus.className = "badge bg-success";
      } catch (err) {
        pdfStatus.textContent = "Failed";
        pdfStatus.className = "badge bg-danger";
        appendSystem(`Could not parse PDF: ${err.message}`);
        sendBtn.disabled = false;
        userInput.focus();
        return;
      }
    }

    try {
      const res = await fetch(`${BACKEND_URL}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, pdf_text: pdfText }),
      });
      const data = await res.json();
      appendMessage(data.reply ?? JSON.stringify(data), "bot");
    } catch (err) {
      appendSystem(`Error: ${err.message}`);
    } finally {
      sendBtn.disabled = false;
      userInput.focus();
    }
  }

  sendBtn.addEventListener("click", sendMessage);
  userInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // ── PDF handling ──────────────────────────────────────────────────────────
  async function extractPdfText(file) {
    const buffer = await file.arrayBuffer();
    const pdf    = await pdfjsLib.getDocument({ data: buffer }).promise;
    const parts  = [];
    for (let i = 1; i <= pdf.numPages; i++) {
      const page    = await pdf.getPage(i);
      const content = await page.getTextContent();
      parts.push(content.items.map(it => it.str).join(" "));
    }
    return parts.join("\n");
  }

  pdfInput.addEventListener("change", () => {
    const file = pdfInput.files[0];
    if (!file) return;
    pendingPdfFile = file;
    pdfFilename.textContent = file.name;
    pdfStatus.textContent = "Attached";
    pdfStatus.className = "badge bg-primary";
    pdfBadge.style.display = "flex";
  });

  removePdf.addEventListener("click", () => {
    pendingPdfFile = null;
    pdfInput.value = "";
    pdfBadge.style.display = "none";
  });

  // ══════════════════════════════════════════════════════════════════════════
  // DASHBOARD
  // ══════════════════════════════════════════════════════════════════════════
  const PALETTE = [
    "#4e79a7","#f28e2b","#e15759","#76b7b2","#59a14f",
    "#edc948","#b07aa1","#ff9da7","#9c755f","#bab0ac",
  ];

  let roleChart = null;
  let locationChart = null;

  async function loadDashboard() {
    const res   = await fetch(`${BACKEND_URL}/api/stats`);
    const stats = await res.json();

    // Pie — roles
    const roleLabels = Object.keys(stats.roles);
    const roleVals   = Object.values(stats.roles);

    if (roleChart) roleChart.destroy();
    roleChart = new Chart(document.getElementById("roleChart"), {
      type: "pie",
      data: {
        labels: roleLabels,
        datasets: [{ data: roleVals, backgroundColor: PALETTE.slice(0, roleLabels.length), borderWidth: 1 }],
      },
      options: {
        plugins: { legend: { position: "right", labels: { boxWidth: 12, font: { size: 11 } } } },
        maintainAspectRatio: false,
      },
    });

    // Bar — locations (sort descending)
    const locEntries = Object.entries(stats.locations).sort((a, b) => b[1] - a[1]);
    const locLabels  = locEntries.map(([k]) => k);
    const locVals    = locEntries.map(([, v]) => v);

    if (locationChart) locationChart.destroy();
    locationChart = new Chart(document.getElementById("locationChart"), {
      type: "bar",
      data: {
        labels: locLabels,
        datasets: [{
          label: "# of Jobs",
          data: locVals,
          backgroundColor: "#4e79a7",
          borderRadius: 4,
        }],
      },
      options: {
        indexAxis: "y",
        plugins: { legend: { display: false } },
        scales: { x: { beginAtZero: true, ticks: { stepSize: 1 } } },
        maintainAspectRatio: false,
      },
    });
  }

  // ── Search / table ────────────────────────────────────────────────────────
  const searchInput  = document.getElementById("search-input");
  const resultsBody  = document.getElementById("results-body");
  const resultCount  = document.getElementById("result-count");

  function renderRows(jobs) {
    resultCount.textContent = `${jobs.length} result${jobs.length !== 1 ? "s" : ""}`;
    if (!jobs.length) {
      resultsBody.innerHTML = `<tr><td colspan="3" class="text-center text-muted py-4">No results found.</td></tr>`;
      return;
    }
    resultsBody.innerHTML = jobs.map(j => {
      const pills = j.tech_stack
        ? j.tech_stack.split(/[,;|]+/).map(t => t.trim()).filter(Boolean)
            .map(t => `<span class="tech-pill">${escHtml(t)}</span>`).join("")
        : '<span class="text-muted small">—</span>';
      // Strip " - Jobstreet" suffix from title for cleaner display
      const title = j.job_title.replace(/ - Jobstreet$/, "");
      return `<tr>
        <td>${escHtml(title)}</td>
        <td>${escHtml(j.company)}</td>
        <td>${pills}</td>
      </tr>`;
    }).join("");
  }

  function escHtml(str) {
    return (str ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  async function fetchJobs(q = "") {
    const res  = await fetch(`${BACKEND_URL}/api/jobs/search?q=${encodeURIComponent(q)}`);
    const jobs = await res.json();
    renderRows(Array.isArray(jobs) ? jobs : []);
  }

  let debounceTimer;
  searchInput.addEventListener("input", () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => fetchJobs(searchInput.value), 300);
  });

  // Load dashboard when tab first shown
  document.getElementById("dash-tab").addEventListener("shown.bs.tab", () => {
    if (!roleChart) {
      loadDashboard();
      fetchJobs();
    }
  });
</script>
</body>
</html>
